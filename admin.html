<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Boon Shoung</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .media-row, .image-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .media-row select { width: 110px; flex-shrink: 0; font-size: 0.8rem; }
    .media-row input, .image-row input { flex: 1; min-width: 150px; }
    .remove-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; }
    .add-btn { background: var(--navy3); color: white; border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer; margin-bottom: 15px; }
    .add-btn:hover { background: var(--navy2); }
  </style>
</head>
<body>

<nav id="navbar">
  <div class="nav-logo">BS<span>.</span> Admin</div>
  <ul class="nav-links">
    <li><a href="index.html" target="_blank">View Live Site</a></li>
    <li><a href="#" id="logout-btn" style="display:none;" onclick="logout()">Logout</a></li>
  </ul>
</nav>

<section id="admin-login" class="admin-section">
  <div class="login-box reveal visible">
    <h2>Admin Login</h2>
    <p>Please enter the master password to manage your projects.</p>
    <input type="password" id="admin-password" placeholder="Enter Password">
    <button class="btn-primary" onclick="login()">Login</button>
  </div>
</section>

<section id="admin-dashboard" class="admin-section" style="display: none;">
  <div class="dashboard-header">
    <h2>Manage Projects</h2>
    <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add New Project</button>
  </div>
  
  <div id="admin-loader" style="text-align: center; margin: 2rem 0; display: none;">
    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--gold);"></i>
    <p>Loading projects...</p>
  </div>

  <table class="projects-table" id="projects-table" style="display: none;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Tags</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="projects-tbody"></tbody>
  </table>
</section>

<div id="project-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modal-title">Add Project</h2>
    <form id="project-form" onsubmit="event.preventDefault(); saveProject();">
      <input type="hidden" id="proj-id">
      
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="proj-title" placeholder="Project Title" required>
      </div>
      
      <div class="form-group">
        <label>Role</label>
        <input type="text" id="proj-role" placeholder="e.g. Lead Developer">
      </div>

      <div class="form-group">
        <label>Short Description</label>
        <textarea id="proj-short" rows="2" required></textarea>
      </div>

      <div class="form-group">
        <label>Detailed Description</label>
        <textarea id="proj-detailed" rows="5"></textarea>
      </div>

      <div class="form-group">
        <label>Tags (Comma separated)</label>
        <input type="text" id="proj-tags" placeholder="e.g. Python, AI, Web">
      </div>

      <div class="form-group">
        <label>Main Image Path</label>
        <input type="text" id="proj-image" placeholder="e.g. images/project1.jpg">
      </div>

      <div class="form-group">
        <label>Gallery Images</label>
        <div id="gallery-container"></div>
        <button type="button" class="add-btn" onclick="addImageRow()"><i class="fas fa-image"></i> Add Gallery Image</button>
      </div>

      <div class="form-group">
        <label>Media Links</label>
        <div id="media-links-container"></div>
        <button type="button" class="add-btn" onclick="addMediaRow()"><i class="fas fa-link"></i> Add Media Link</button>
      </div>

      <button type="submit" class="btn-primary" id="save-btn" style="width: 100%; margin-top: 1rem;">Save Project</button>
    </form>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
