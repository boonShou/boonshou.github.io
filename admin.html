<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Boon Shoung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
<style>
  .media-link-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .media-link-row select { width: 120px; flex-shrink: 0; }
  .media-link-row input { flex-grow: 1; }
  .remove-link-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; }
  .remove-link-btn:hover { background: #ff3333; }
  .add-link-btn { background: #4CAF50; color: white; border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer; margin-bottom: 15px; }
  .add-link-btn:hover { background: #45a049; }
</style>
</head>
<body>

<nav id="navbar">
  <div class="nav-logo">BS<span>.</span> Admin</div>
  <ul class="nav-links">
    <li><a href="index.html" target="_blank">View Live Site</a></li>
    <li><a href="#" id="logout-btn" style="display:none;" onclick="logout()">Logout</a></li>
  </ul>
</nav>

<section id="admin-login" class="admin-section">
  <div class="login-box reveal visible">
    <h2>Admin Login</h2>
    <p>Please enter the master password to manage your projects.</p>
    <input type="password" id="admin-password" placeholder="Enter Password">
    <button class="btn-primary" onclick="login()">Login</button>
    <p id="login-error" style="color: red; margin-top: 10px; display: none;">Invalid password.</p>
  </div>
</section>

<section id="admin-dashboard" class="admin-section" style="display: none;">
  <div class="dashboard-header">
    <h2>Manage Projects</h2>
    <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add New Project</button>
  </div>
  
  <div id="admin-loader" style="text-align: center; margin: 2rem 0;">
    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--gold);"></i>
    <p>Loading projects...</p>
  </div>

  <table class="projects-table" id="projects-table" style="display: none;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Tags</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="projects-tbody">
      <!-- Rendered via JS -->
    </tbody>
  </table>
</section>

<!-- Edit/Add Modal -->
<div id="project-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modal-title">Add Project</h2>
    <input type="hidden" id="proj-id">
    
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="proj-title" placeholder="Project Title">
    </div>
    
    <div class="form-group">
      <label>Role</label>
      <input type="text" id="proj-role" placeholder="e.g. Lead Developer">
    </div>

    <div class="form-group">
      <label>Short Description (For main page)</label>
      <textarea id="proj-short" rows="2"></textarea>
    </div>

    <div class="form-group">
      <label>Detailed Description (For project detail page)</label>
      <textarea id="proj-detailed" rows="5"></textarea>
    </div>

    <div class="form-group">
      <label>Tags (Comma separated)</label>
      <input type="text" id="proj-tags" placeholder="e.g. Python, AI, Web">
    </div>

    <div class="form-group">
      <label>Image Path (Relative GitHub Path)</label>
      <input type="text" id="proj-image" placeholder="e.g. images/project1.jpg">
      <small style="color: var(--light-text); font-size: 0.8rem; margin-top: 5px; display: block;">Upload image to the 'images/' folder in your GitHub repo first.</small>
    </div>

    <div class="form-group">
      <label>Media Links</label>
      <div id="media-links-container">
        <!-- Rows will be added here -->
      </div>
      <button type="button" class="add-link-btn" onclick="addMediaRow()"><i class="fas fa-plus"></i> Add Link</button>
    </div>

    <button class="btn-primary" onclick="saveProject()" id="save-btn" style="width: 100%; margin-top: 1rem;">Save Project</button>
  </div>
</div>

<script src="js/script.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
