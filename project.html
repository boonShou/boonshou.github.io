<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | Boon Shoung</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #project-loader { text-align: center; margin: 100px auto; }
    #project-loader i { font-size: 3rem; color: var(--gold); }
    #project-loader p { margin-top: 20px; color: var(--gold); }
    #project-detail-container { display: none; }
  </style>
</head>
<body>

  <nav id="navbar">
    <div class="nav-logo">BS<span>.</span></div>
    <ul class="nav-links">
      <li><a href="index.html">BACK TO HOME</a></li>
    </ul>
  </nav>

  <section class="project-detail">
    <div id="project-loader">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Loading Project Details...</p>
    </div>

    <div id="project-detail-container">
      <!-- Content will be injected here -->
    </div>
  </section>

  <footer>
    <p>&copy; 2024 <span>Boon Shoung</span>. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
  <script>
    let lastDetailData = null;

    async function loadProjectDetails(isAutoSync = false) {
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('id');
      const container = document.getElementById('project-detail-container');
      const loader = document.getElementById('project-loader');

      if (!projectId) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const response = await fetch(`${SCRIPT_URL}?id=${projectId}`);
        const result = await response.json();

        if (result.status === 'success' && result.data.length > 0) {
          const proj = result.data[0];
          const dataString = JSON.stringify(proj);
          
          if (dataString === lastDetailData) return; // No change
          lastDetailData = dataString;
          
          // Render Tags as Badges
          const tagsHtml = (proj.tags || '').split(',').map(t => `<span class="project-tag">${t.trim()}</span>`).join(' ');

          // Render Gallery
          let galleryHtml = '';
          if (proj.image_url) {
            galleryHtml += `
              <div class="gallery-item reveal visible" onclick="openLightbox('${proj.image_url}')">
                <img src="${proj.image_url}" alt="Main Image">
              </div>
            `;
          }
          if (proj.additional_images) {
            proj.additional_images.split('|').forEach(path => {
              galleryHtml += `
                <div class="gallery-item reveal visible" onclick="openLightbox('${path}')">
                  <img src="${path}" alt="Gallery Image">
                </div>
              `;
            });
          }

          container.innerHTML = `
            <div class="project-header reveal visible">
              <h1>${proj.title}</h1>
              <div class="project-meta">
                <div class="meta-item">
                  <span class="meta-label">Role</span>
                  <div class="meta-value"><span class="project-tag">${proj.role || 'Contributor'}</span></div>
                </div>
                <div class="meta-item">
                  <span class="meta-label">Tags</span>
                  <div class="meta-value">${tagsHtml || 'N/A'}</div>
                </div>
              </div>
              <div class="project-media">
                ${renderMediaIcons(proj.media || proj[""])}
              </div>
            </div>
            
            <div class="project-gallery">
              ${galleryHtml}
            </div>

            <div class="project-content reveal visible">
              <p>${(proj.detailed_description || proj.short_description || '').replace(/\n/g, '<br>')}</p>
            </div>
          `;
          
          loader.style.display = 'none';
          container.style.display = 'block';
        } else if (!isAutoSync) {
          container.innerHTML = '<p style="text-align:center; color:red;">Project not found.</p>';
          loader.style.display = 'none';
          container.style.display = 'block';
        }
      } catch (error) {
        if (!isAutoSync) {
          console.error('Error:', error);
          container.innerHTML = '<p style="text-align:center; color:red;">Error loading project details.</p>';
          loader.style.display = 'none';
          container.style.display = 'block';
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadProjectDetails();
      setInterval(() => loadProjectDetails(true), 20000);
    });
  </script>
</body>
</html>
